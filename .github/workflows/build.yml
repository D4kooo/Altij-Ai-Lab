name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Patch broken CMS dep (workaround)
        run: |
          jq 'del(.dependencies["@payloadcms/storage-local"])' apps/cms/package.json > apps/cms/package.json.tmp
          mv apps/cms/package.json.tmp apps/cms/package.json

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Run tests with coverage
        working-directory: apps/public
        run: bun run test:coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
