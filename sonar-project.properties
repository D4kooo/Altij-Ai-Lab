sonar.projectKey=DataRing-Hub

# Sources
sonar.sources=apps,packages
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/vitest.config.ts,**/test/setup.ts

# Tests
sonar.tests=apps/public/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Coverage (lcov generated by vitest --coverage in apps/public)
sonar.javascript.lcov.reportPaths=apps/public/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/public/coverage/lcov.info
